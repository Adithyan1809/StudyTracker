{% extends "base.html" %}

{% block title %}Add Subject | StudyTracker{% endblock %}

{% block content %}
<h1 class="page-title">Add Subject</h1>
<p class="page-subtitle">Create a dedicated subject space so your tasks stay organized by class, topic, or exam.</p>

<div class="form-card">
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Subject</button>
    </form>
</div>
{% endblock %}
