<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StudyTracker{% endblock %}</title>
    <style>
        :root {
            --bg: #0f172a;
            --bg-soft: #111827;
            --panel: rgba(15, 23, 42, 0.72);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text: #e5eefc;
            --muted: #9ca3af;
            --accent: #38bdf8;
            --accent-2: #a78bfa;
            --success: #22c55e;
            --danger: #f87171;
            --warning: #fbbf24;
            --shadow: 0 20px 50px rgba(2, 6, 23, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(56, 189, 248, 0.22), transparent 32%),
                radial-gradient(circle at top right, rgba(167, 139, 250, 0.18), transparent 24%),
                linear-gradient(180deg, #020617 0%, #0f172a 55%, #111827 100%);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .shell {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 40px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 18px 22px;
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .brand strong {
            font-size: 1.3rem;
            letter-spacing: 0.02em;
        }

        .brand span {
            color: var(--muted);
            font-size: 0.92rem;
        }

        .navlinks {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .navlinks a,
        .pill-link,
        button,
        input[type="submit"] {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 0;
            border-radius: 999px;
            padding: 11px 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        .navlinks a,
        .pill-link {
            color: var(--text);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .navlinks a:hover,
        .pill-link:hover,
        button:hover,
        input[type="submit"]:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(8, 15, 33, 0.28);
        }

        .primary-link,
        button,
        input[type="submit"] {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #081120;
        }

        .content {
            border: 1px solid var(--panel-border);
            border-radius: 30px;
            background: var(--panel);
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
            padding: 28px;
        }

        .page-title {
            margin: 0 0 8px;
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1.1;
        }

        .page-subtitle {
            margin: 0 0 26px;
            color: var(--muted);
            max-width: 65ch;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            padding: 18px;
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.03));
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .stat-card .label {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 800;
        }

        .progress-shell {
            margin-bottom: 24px;
        }

        .progress-track {
            width: 100%;
            height: 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.07);
        }

        .progress-fill {
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--accent), var(--success));
        }

        .panel-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin: 0 0 18px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
        }

        .table-wrap {
            overflow-x: auto;
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 760px;
            background: rgba(15, 23, 42, 0.45);
        }

        th,
        td {
            padding: 16px 18px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        th {
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #cbd5e1;
            background: rgba(255, 255, 255, 0.05);
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: capitalize;
        }

        .status-pill.pending {
            background: rgba(251, 191, 36, 0.12);
            color: #fcd34d;
        }

        .status-pill.completed {
            background: rgba(34, 197, 94, 0.14);
            color: #86efac;
        }

        .danger-link {
            color: #fecaca;
        }

        .form-card {
            max-width: 780px;
            padding: 24px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        form p {
            display: grid;
            gap: 8px;
            margin-bottom: 18px;
        }

        label {
            font-weight: 600;
            color: #dbeafe;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 13px 14px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(15, 23, 42, 0.72);
            color: var(--text);
            outline: none;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: rgba(56, 189, 248, 0.65);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.14);
        }

        .empty-state {
            padding: 26px;
            border-radius: 22px;
            border: 1px dashed rgba(255, 255, 255, 0.14);
            color: var(--muted);
            text-align: center;
        }

        @media (max-width: 900px) {
            .topbar,
            .panel-title {
                flex-direction: column;
                align-items: flex-start;
            }

            .stats-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            .shell {
                width: min(100% - 20px, 1180px);
                padding: 10px 0 24px;
            }

            .content,
            .topbar {
                border-radius: 22px;
                padding: 18px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <div class="brand">
                <strong>StudyTracker</strong>
                <span>Organize subjects, track tasks, and stay on top of deadlines.</span>
            </div>
            <nav class="navlinks">
                <a href="{% url 'dashboard' %}">Dashboard</a>
                <a href="{% url 'add-subject' %}">Add Subject</a>
                <a class="primary-link" href="{% url 'add-task' %}">Add Task</a>
            </nav>
        </header>

        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
