{% extends "base.html" %}

{% block title %}Add Task | StudyTracker{% endblock %}

{% block content %}
<section style="margin-bottom: 22px;">
    <h1 class="page-title">Add Task</h1>
    <p class="page-subtitle">Capture assignments, deadlines, and priority in one clean place so nothing slips through.</p>
</section>

<div class="form-card">
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Task</button>
    </form>
</div>
{% endblock %}
